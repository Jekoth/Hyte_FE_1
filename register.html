<!doctype html>
<html lang="fi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <meta name="description" content="MealEntry rekisteröityminen" />
    <title>MealEntry | Rekisteröidy</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300;1,300&family=Roboto+Slab:wght@300;400;700;900&family=Roboto:wght@300;400;700;900&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="/src/css/style.css" />
  </head>

  <body>
    <nav class="site-nav">
      <div class="nav-inner">
        <a href="index.html" class="logo">MealEntry</a>

        <ul class="nav-links">
          <li><a href="index.html" class="navlink">Koti</a></li>
          <li><a href="bmi.html" class="navlink">BMI laskuri</a></li>
          <span id="userBadge" class="user-badge"></span>
          <li class="nav-right">
            <a href="login.html" class="navlink nav-cta" id="authLink">Kirjaudu</a>
          </li>
        </ul>
      </div>
    </nav>

    <header class="hero" style="margin-top: 20px;">
      <div class="hero-content">
        <p class="hero-kicker">Uusi käyttäjä</p>
        <h1 class="hero-title" style="font-size: 36px;">
          Rekisteröidy <span class="main_cl">MealEntryyn</span>
        </h1>
        <p class="hero-lead" style="margin-bottom: 0;">
          Luo tili ja aloita merkintöjen tekeminen.
        </p>
      </div>
    </header>

    <main>
      <section class="card" style="margin-top: 24px;">
        <h2 class="black_cl bolder">Rekisteröityminen</h2>
        <p class="description">Täytä tiedot ja luo tili.</p>

        <p id="formMsg" style="display:none; margin: 10px 0; font-weight: 700;"></p>

        <form id="registerForm">
          <label for="username">Käyttäjänimi</label>
          <input type="text" id="username" name="username" placeholder="esim. rizvan" required />

          <label for="email">Sähköposti</label>
          <input type="email" id="email" name="email" placeholder="esim. rizvan@example.com" required />

          <label for="password">Salasana</label>
          <input type="password" id="password" name="password" placeholder="••••••••" required />

          <label for="password2">Salasana uudelleen</label>
          <input type="password" id="password2" name="password2" placeholder="••••••••" required />

          <button class="btn" id="registerBtn" type="submit">Luo tili</button>
        </form>

        <p style="margin-top: 10px; color: rgba(24,31,37,0.75);">
          Onko sinulla jo tili? <a href="login.html" class="main_cl">Kirjaudu</a>
        </p>
      </section>
    </main>

    <footer><p>Copyright, MealEntry</p></footer>

    <script type="module" src="/src/js/register.js"></script>
  </body>
</html>
